<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Scalping Bot Dashboard</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a;
            color: #ffffff;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
        }
        
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: #2d2d2d;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        
        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #444;
        }
        
        .positive { color: #4CAF50; }
        .negative { color: #f44336; }
        .neutral { color: #FFC107; }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🚀 Crypto Scalping Bot</h1>
            <div>PAPER TRADING</div>
            <div style="margin-top: 15px;">
                <a href="analytics.html" style="background: rgba(255,255,255,0.2); color: white; padding: 8px 16px; text-decoration: none; border-radius: 5px; display: inline-block;">
                    📈 Analytics Dashboard
                </a>
            </div>
        </header>
        
        <div class="dashboard-grid">
            <div class="card">
                <h3>📊 Portfolio Overview</h3>
                <div class="stat-item">
                    <span>Total Balance:</span>
                    <span id="totalBalance">$500.00</span>
                </div>
                <div class="stat-item">
                    <span>Daily P&L:</span>
                    <span id="dailyPnl">$0.00 (0.00%)</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
